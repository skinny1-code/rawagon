name: CI
on:
  push: {branches:[main,develop]}
  pull_request: {branches:[main]}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version:'20'}
      - run: node packages/fee-distributor/index.js || true
      - run: node packages/zk-identity/index.js || true
      - run: node packages/gold-oracle/index.js || true
